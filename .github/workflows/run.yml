name: Intelligence Desk engine

# Runs the recognition engine on a schedule and commits the refreshed feed.
# No server — GitHub spins up a machine, runs the script, and shuts it down.

on:
  schedule:
    - cron: "17 * * * *"      # every hour at :17 past (UTC). Change to taste.
  workflow_dispatch: {}         # adds a "Run workflow" button in the Actions tab for manual runs

permissions:
  contents: write               # lets the job commit the updated incidents.json

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run the engine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python engine.py

      - name: Commit the refreshed feed
        run: |
          git config user.name  "intelligence-desk-bot"
          git config user.email "intelligence-desk-bot@users.noreply.github.com"
          git add incidents.json incidents.db
          git commit -m "Refresh incident feed [skip ci]" || echo "No changes to commit"
          git push
